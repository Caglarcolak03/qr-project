<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR KOD TASARLAMA | Profesyonel Menü Oluşturucu</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Modern Font Eklendi -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style> 
        :root {
            --ana-renk: #2863ed;
            --ikincil-renk: #f52d2d;
            --arka-plan-gradient: linear-gradient(135deg, rgba(40, 99, 237, 0.05) 0%, rgba(240, 255, 244, 0.9) 100%);
            --golge: 0 10px 30px rgba(0,0,0,0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            transition: all 0.5s ease;
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
        }

        .sade-arka-plan {
            background: #f8fafc !important;
        }

        /* Navbar Güzelleştirme */
        .ustTaraf {
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 60px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logoBasligi {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logoBasligi:hover { opacity: 0.8; }

        .fa-qrcode {
            font-size: 32px; 
            color: var(--ana-renk);
            filter: drop-shadow(0 2px 4px rgba(40,99,237,0.3));
        }

        .baslik {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1a1a1a;
        }

        .butonDuzenleme {
            display: flex;
            gap: 12px;
        }

        /* Buton Stilleri */
        .buttonÖz {
            background-color: var(--ana-renk);
            color: white;
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(40, 99, 237, 0.2);
        }

        .buttonÖz:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 99, 237, 0.3);
        }

        /* Akış Adımları */
        .akis-konteyner {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 80px auto 40px;
            max-width: 1000px;
            padding: 0 20px;
        }

        .akis-adim {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            width: 220px;
            text-align: center;
            box-shadow: var(--golge);
            transition: 0.4s;
            border: 1px solid rgba(40, 99, 237, 0.1);
            position: relative;
        }

        .akis-adim:hover {
            transform: translateY(-10px);
            border-color: var(--ana-renk);
        }

        .akis-adim i {
            font-size: 30px;
            color: var(--ana-renk);
            margin-bottom: 15px;
            background: rgba(40, 99, 237, 0.1);
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
        }

        .akis-adim span {
            font-weight: 600;
            font-size: 15px;
            display: block;
        }

        /* Formlar */
        #formKutusu {
            display: none; 
            width: 100%;
            min-height: 80vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .form-icerik {
            background-color: #fff;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 380px;
            border: 1px solid #f0f0f0;
        }

        .inputStil {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            border: 1.5px solid #eee;
            box-sizing: border-box;
            transition: 0.3s;
            font-family: inherit;
        }

        .inputStil:focus {
            border-color: var(--ana-renk);
            outline: none;
            box-shadow: 0 0 0 4px rgba(40, 99, 237, 0.1);
        }

        .ana-eylem-alani {
            text-align: center;
            margin: 50px 0;
        }

        .buyuk-qr-buton {
            background-color: white;
            color: var(--ana-renk);
            border: 2.5px solid var(--ana-renk);
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(40, 99, 237, 0.15);
        }

        .buyuk-qr-buton:hover {
            background-color: var(--ana-renk);
            color: white;
            transform: scale(1.05);
        }

        /* Panel Düzenlemeleri */
        #menuPaneli {
            display: none;
            max-width: 750px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--golge);
        }

        .kategori-kutu {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8fafc;
            border-radius: 20px;
            border: 1px solid #edf2f7;
        }

        .urun-satiri {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .dosya-sec {
            font-size: 12px;
            border: none;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 8px;
        }

        #qrCiktisi { display: none; }

        #qrResim {
            border: 15px solid white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            margin: 20px 0;
            width: 250px;
            height: 250px;
        }

        /* Müşteri Menüsü (Önizleme) */
        #musteriMenusu {
            display: none;
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: var(--golge);
        }

        .m-urun-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 15px;
            margin-right: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Yazdırma Ayarı */
        @media print {
            .ustTaraf, .buttonÖz, #previewBtn { display: none !important; }
            #menuPaneli { box-shadow: none; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="ustTaraf" id="navbar">
        <div class="logoBasligi" onclick="anaSayfayaDon()">
            <i class="fa-solid fa-qrcode"></i> <h1 class="baslik">QR MENÜ PRO</h1>
        </div>
        <div id="authButtons" class="butonDuzenleme">
            <button class="buttonÖz" onclick="formuAc('giris')" style="background: transparent; color: var(--ana-renk); border: 2px solid var(--ana-renk); box-shadow: none;"> Giriş Yap </button>
            <button class="buttonÖz" onclick="formuAc('kayit')"> Ücretsiz Kayıt Ol </button>
        </div>
    </div>

    <div id="anaIcerik">
        <div class="akis-konteyner">
            <div id="step1" class="akis-adim"><i class="fa-solid fa-user-plus"></i><br><span>Hesap Oluştur</span></div>
            <i class="fa-solid fa-chevron-right" style="color:#cbd5e1"></i>
            <div id="step2" class="akis-adim"><i class="fa-solid fa-list-check"></i><br><span>Menünü Düzenle</span></div>
            <i class="fa-solid fa-chevron-right" style="color:#cbd5e1"></i>
            <div id="step3" class="akis-adim"><i class="fa-solid fa-rocket"></i><br><span>Hemen Yayınla</span></div>
        </div>

        <div class="ana-eylem-alani">
            <button id="mainQrBtn" class="buyuk-qr-buton" onclick="qrIslemi()">
                <i class="fa-solid fa-plus-circle"></i> Saniyeler İçinde QR Oluştur
            </button>
        </div>
    </div>

    <div id="formKutusu">
        <div class="form-icerik">
            <h3 id="formBaslik" style="margin-top: 0; font-size: 24px;">Kayıt Ol</h3>
            <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Hemen menünü oluşturmaya başla.</p>
            <input type="text" id="userName" placeholder="Ad Soyad" class="inputStil">
            <input type="email" id="userEmail" placeholder="E-posta Adresiniz" class="inputStil">
            <input type="password" placeholder="Şifre" class="inputStil">
            <!-- Dinamik Buton -->
            <button id="formSubmitBtn" class="buttonÖz" style="width: 100%; margin-top: 15px; padding: 15px;" onclick="girisYap()">Kayıt Ol</button>
            <p id="closeBtn" onclick="formuKapat()" style="color:#777; cursor:pointer; margin-top:20px; font-size: 13px; text-decoration: underline;">Vazgeç ve ana sayfaya dön</p>
        </div>
    </div>

    <div id="menuPaneli">
        <h2 style="text-align: center; color: #333; margin-bottom: 30px;">Dijital Menü Tasarımcısı</h2>
        <div style="margin-bottom: 30px;">
            <label style="font-weight: 600; font-size: 14px; color: #555;">İşletme Adı</label>
            <input type="text" id="cafeAdi" placeholder="Örn: Gurme Restoran" class="inputStil" style="font-size: 18px; font-weight: 600;">
        </div>

        <div class="kategori-kutu">
            <h4 style="color: var(--ana-renk); margin-top: 0; display: flex; align-items: center; gap: 10px;"><i class="fa-solid fa-utensils"></i> Yiyecekler</h4>
            <div id="liste-yiyecek">
                <div class="urun-satiri">
                    <input type="text" placeholder="Hamburger..." class="inputStil yiyecek-ad" style="width: 55%;">
                    <input type="text" placeholder="₺ 250" class="inputStil yiyecek-fiyat" style="width: 35%;">
                    <input type="file" class="dosya-sec yiyecek-img" accept="image/png, image/jpeg">
                </div>
            </div>
            <button class="buttonÖz" style="background-color: #e2e8f0; color: #475569; padding: 8px 15px; font-size: 12px; box-shadow: none;" onclick="yeniUrunEkle('yiyecek')">+ Yeni Ürün</button>
        </div>

        <div class="kategori-kutu">
            <h4 style="color: var(--ana-renk); margin-top: 0; display: flex; align-items: center; gap: 10px;"><i class="fa-solid fa-mug-hot"></i> İçecekler</h4>
            <div id="liste-icecek">
                <div class="urun-satiri">
                    <input type="text" placeholder="Limonata..." class="inputStil icecek-ad" style="width: 55%;">
                    <input type="text" placeholder="₺ 80" class="inputStil icecek-fiyat" style="width: 35%;">
                    <input type="file" class="dosya-sec icecek-img" accept="image/png, image/jpeg">
                </div>
            </div>
            <button class="buttonÖz" style="background-color: #e2e8f0; color: #475569; padding: 8px 15px; font-size: 12px; box-shadow: none;" onclick="yeniUrunEkle('icecek')">+ Yeni Ürün</button>
        </div>

        <div class="kategori-kutu">
            <h4 style="color: var(--ana-renk); margin-top: 0; display: flex; align-items: center; gap: 10px;"><i class="fa-solid fa-cake-candles"></i> Tatlılar</h4>
            <div id="liste-tatli">
                <div class="urun-satiri">
                    <input type="text" placeholder="Tiramisu..." class="inputStil tatli-ad" style="width: 55%;">
                    <input type="text" placeholder="₺ 180" class="inputStil tatli-fiyat" style="width: 35%;">
                    <input type="file" class="dosya-sec tatli-img" accept="image/png, image/jpeg">
                </div>
            </div>
            <button class="buttonÖz" style="background-color: #e2e8f0; color: #475569; padding: 8px 15px; font-size: 12px; box-shadow: none;" onclick="yeniUrunEkle('tatli')">+ Yeni Ürün</button>
        </div>

        <button class="buttonÖz" style="width: 100%; margin-top: 20px; padding: 18px; font-size: 16px;" onclick="gercekQrOlustur()">
            <i class="fa-solid fa-magic"></i> MENÜYÜ VE QR KODU OLUŞTUR
        </button>

        <div id="qrCiktisi">
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            <h4 id="sonucBaslik" style="font-size: 20px; text-align: center;">🎉 Harika! QR Kodunuz Hazır</h4>
            <div style="text-align: center;">
                <img id="qrResim" src="" alt="QR Kod">
            </div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                <button id="previewBtn" class="buttonÖz" style="background-color: #6366f1;">ÖNİZLEMEYİ GÖR</button>
            </div>
        </div>
    </div>

    <div id="musteriMenusu">
        <h2 id="m-isletmeAdi" style="text-align: center; color: var(--ana-renk); font-size: 28px; margin-bottom: 30px;"></h2>
        <div id="m-liste"></div>
        <p style="text-align: center; color: #94a3b8; font-size: 12px; margin-top: 40px;">QR Menü Pro ile oluşturulmuştur</p>
    </div>

    <script>
        let girisYapildi = false;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('menu')) {
                const data = localStorage.getItem('qr_menu_data');
                if(data) musteriGorunumuAc(data);
            }
        };

        function formuAc(mod) {
            document.body.classList.add("sade-arka-plan");
            document.getElementById("anaIcerik").style.display = "none";
            document.getElementById("formKutusu").style.display = "flex";
            
            const baslik = document.getElementById("formBaslik");
            const buton = document.getElementById("formSubmitBtn");
            const isimAlani = document.getElementById("userName");

            if(mod === 'kayit') {
                baslik.innerText = "Kayıt Ol";
                buton.innerText = "Kayıt Ol";
                isimAlani.style.display = "block";
            } else {
                baslik.innerText = "Giriş Yap";
                buton.innerText = "Giriş Yap";
                isimAlani.style.display = "none";
            }
        }

        function formuKapat() {
            document.body.classList.remove("sade-arka-plan");
            document.getElementById("formKutusu").style.display = "none";
            document.getElementById("anaIcerik").style.display = "block";
        }

        function anaSayfayaDon() { window.location.href = window.location.pathname; }

        function girisYap() {
            girisYapildi = true;
            formuKapat();
            document.getElementById("authButtons").innerHTML = `<span style="font-weight:600; color:var(--ana-renk);"><i class="fa-solid fa-circle-user"></i> Hoş Geldiniz</span>`;
            document.getElementById("mainQrBtn").style.backgroundColor = "var(--ana-renk)";
            document.getElementById("mainQrBtn").style.color = "white";
        }

        function qrIslemi() {
            if(!girisYapildi) { alert("Lütfen önce giriş yapın!"); formuAc('giris'); return; }
            document.body.classList.add("sade-arka-plan");
            document.getElementById("anaIcerik").style.display = "none";
            document.getElementById("menuPaneli").style.display = "block";
        }

        function yeniUrunEkle(kat) {
            const liste = document.getElementById("liste-" + kat);
            const div = document.createElement("div");
            div.className = "urun-satiri";
            div.innerHTML = `<input type="text" placeholder="Ürün" class="inputStil ${kat}-ad" style="width: 55%;"><input type="text" placeholder="Fiyat" class="inputStil ${kat}-fiyat" style="width: 30%;"><input type="file" class="dosya-sec ${kat}-img" accept="image/png, image/jpeg">`;
            liste.appendChild(div);
        }

        function fileToSmallBase64(file) {
            return new Promise((resolve) => {
                if(!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const max_size = 120; 
                        let width = img.width;
                        let height = img.height;
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function gercekQrOlustur() {
            const cafe = document.getElementById("cafeAdi").value || "İşletme Menüsü";
            let menuObj = { c: cafe, items: [] };
            const kats = [{id: "yiyecek", n: "Yiyecekler"}, {id: "icecek", n: "İçecekler"}, {id: "tatli", n: "Tatlılar"}];

            for(let k of kats) {
                const adlar = document.getElementsByClassName(k.id + "-ad");
                const fiyatlar = document.getElementsByClassName(k.id + "-fiyat");
                const dosyalar = document.getElementsByClassName(k.id + "-img");
                for(let i=0; i<adlar.length; i++) {
                    if(adlar[i].value) {
                        const img = await fileToSmallBase64(dosyalar[i].files[0]);
                        menuObj.items.push({k: k.n, a: adlar[i].value, f: fiyatlar[i].value, i: img});
                    }
                }
            }

            // Veriyi localStorage'a yazarak URL limitini aşıyoruz
            localStorage.setItem('qr_menu_data', JSON.stringify(menuObj));
            const sonLink = window.location.origin + window.location.pathname + "?menu=true";
            
            document.getElementById("qrResim").src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(sonLink);
            document.getElementById("qrCiktisi").style.display = "block";
            document.getElementById("previewBtn").onclick = function() { window.open(sonLink, '_blank'); };
        }

        function musteriGorunumuAc(dataStr) {
            try {
                const decoded = JSON.parse(dataStr);
                document.getElementById("navbar").style.display = "none";
                document.getElementById("anaIcerik").style.display = "none";
                document.getElementById("menuPaneli").style.display = "none";
                document.getElementById("musteriMenusu").style.display = "block";
                document.body.classList.add("sade-arka-plan");
                document.getElementById("m-isletmeAdi").innerText = decoded.c;

                let html = "";
                const gruplar = {};
                decoded.items.forEach(item => {
                    if(!gruplar[item.k]) gruplar[item.k] = [];
                    gruplar[item.k].push(item);
                });

                for(let kat in gruplar) {
                    html += `<div class="kategori-kutu"><h4 style="color:var(--ana-renk); border-bottom: 2px solid #eee; padding-bottom: 10px;">${kat}</h4>`;
                    gruplar[kat].forEach(item => {
                        html += `<div style="display:flex; align-items:center; justify-content:space-between; padding:15px 0; border-bottom:1px solid #f0f0f0;"><div style="display:flex; align-items:center;">${item.i ? `<img src="${item.i}" class="m-urun-img">` : ''}<span style="font-weight:500;">${item.a}</span></div><span style="font-weight:700; color:var(--ana-renk);">${item.f} TL</span></div>`;
                    });
                    html += `</div>`;
                }
                document.getElementById("m-liste").innerHTML = html;
            } catch(e) { console.error("Hata", e); }
        }
    </script>
</body> 
</html>
